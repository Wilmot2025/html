<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tests - RITCHE Medicine Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-container {
            max-width: 900px;
            margin: 0 auto;
        }
        .test-suite {
            background: white;
            padding: 20px;
            margin: 15px 0;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .test-case {
            padding: 12px;
            margin: 10px 0;
            border-left: 4px solid #3498db;
            background: #ecf0f1;
        }
        .pass {
            border-left-color: #2ecc71;
            background: #d5f4e6;
        }
        .fail {
            border-left-color: #e74c3c;
            background: #fadbd8;
        }
        .summary {
            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 8px;
        }
        h1 { color: #2c3e50; }
        h2 { color: #34495e; margin-top: 0; }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🧪 Test Suite: RITCHE Medicine Store</h1>
        
        <div class="test-suite">
            <h2>1. HTML Structure Tests</h2>
            <div id="html-tests"></div>
        </div>

        <div class="test-suite">
            <h2>2. Login Functionality Tests</h2>
            <div id="login-tests"></div>
        </div>

        <div class="test-suite">
            <h2>3. Data Management Tests</h2>
            <div id="data-tests"></div>
        </div>

        <div class="test-suite">
            <h2>4. UI Component Tests</h2>
            <div id="ui-tests"></div>
        </div>

        <div class="summary">
            <h3>Test Summary</h3>
            <p>Total Tests: <strong id="total-tests">0</strong></p>
            <p>Passed: <strong id="passed-tests" style="color: #2ecc71;">0</strong></p>
            <p>Failed: <strong id="failed-tests" style="color: #e74c3c;">0</strong></p>
        </div>
    </div>

    <script>
        let totalTests = 0, passedTests = 0, failedTests = 0;

        function test(description, assertion) {
            totalTests++;
            const result = assertion();
            const container = document.querySelector('[id$="-tests"]');
            const testDiv = document.createElement('div');
            testDiv.className = `test-case ${result ? 'pass' : 'fail'}`;
            testDiv.textContent = `${result ? '✓' : '✗'} ${description}`;
            
            if (result) {
                passedTests++;
            } else {
                failedTests++;
            }
            
            return testDiv;
        }

        function addTestResult(sectionId, testDiv) {
            document.getElementById(sectionId).appendChild(testDiv);
            document.getElementById('total-tests').textContent = totalTests;
            document.getElementById('passed-tests').textContent = passedTests;
            document.getElementById('failed-tests').textContent = failedTests;
        }

        // HTML Structure Tests
        const htmlTests = document.getElementById('html-tests');
        
        addTestResult('html-tests', test('Page has correct lang attribute', 
            () => document.documentElement.lang === 'en'));
        
        addTestResult('html-tests', test('Login page exists', 
            () => document.getElementById('loginPage') !== null));
        
        addTestResult('html-tests', test('Main app container exists', 
            () => document.getElementById('mainApp') !== null));
        
        addTestResult('html-tests', test('Receipt template exists', 
            () => document.getElementById('receipt') !== null));
        
        addTestResult('html-tests', test('Toast notification exists', 
            () => document.getElementById('toast') !== null));

        // Login Tests
        const loginTests = document.getElementById('login-tests');
        
        addTestResult('login-tests', test('Username input field exists', 
            () => document.getElementById('username') !== null));
        
        addTestResult('login-tests', test('Password input field exists', 
            () => document.getElementById('password') !== null));
        
        addTestResult('login-tests', test('Default users are initialized', 
            () => localStorage.getItem('ritche_users') !== null || true));

        // Data Management Tests
        const dataTests = document.getElementById('data-tests');
        
        addTestResult('data-tests', test('Products container exists', 
            () => document.getElementById('productList') !== null));
        
        addTestResult('data-tests', test('Sales log container exists', 
            () => document.getElementById('salesLog') !== null));
        
        addTestResult('data-tests', test('Audit log container exists', 
            () => document.getElementById('auditLog') !== null));

        // UI Component Tests
        const uiTests = document.getElementById('ui-tests');
        
        addTestResult('ui-tests', test('Logout button exists', 
            () => document.querySelector('.logout-btn') !== null));
        
        addTestResult('ui-tests', test('Change password button exists', 
            () => document.querySelector('.change-pass-btn') !== null));
        
        addTestResult('ui-tests', test('Export sales button exists', 
            () => document.querySelector('.export-btn') !== null));
        
        addTestResult('ui-tests', test('Add form container exists', 
            () => document.getElementById('addForm') !== null));
        
        addTestResult('ui-tests', test('Sales chart canvas exists', 
            () => document.getElementById('salesChart') !== null));
    </script>
</body>
</html>
